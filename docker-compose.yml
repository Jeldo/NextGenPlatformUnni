services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
      POSTGRES_DB: treatment_calendar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar -d treatment_calendar"]
      interval: 5s
      timeout: 3s
      retries: 5

  calendar-api:
    build:
      context: ./calendar-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://calendar:calendar@postgres:5432/treatment_calendar?sslmode=disable
      - ADMIN_API_URL=http://admin-api:8081
      - PORT=8080
      - ENV=development
    depends_on:
      postgres:
        condition: service_healthy

  admin-api:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql+asyncpg://calendar:calendar@postgres:5432/treatment_calendar
      - PORT=8081
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - calendar-api

volumes:
  pgdata:
